window.__errs = [];
window.onerror = function (msg, url, line) {
  window.__errs.push({ msg: msg, url: url, line: line });

    var d = document.createElement('div');
    d.id = '__err';
    d.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;background:rgba(0,0,0,.85);color:#0f0;font:12px monospace;padding:8px;max-height:40vh;overflow:auto;white-space:pre-wrap;word-break:break-all;';

    return d;
  })();
  div.innerHTML = msg + ' (' + url + ':' + line + ')' + '<br>' + div.innerHTML;
  return true;
};
window.onunhandledrejection = function (e) {
  window.onerror(e.reason && e.reason.message || String(e.reason), '', 0);
};
